# =============================================
# 规划中心框架默认配置
# 所有参数集中在此，便于统一管理和调优
# =============================================

features:
  # 9个原始相似度特征（查询侧只传这9个）
  raw_features:
    - 吨煤产气量
    - 主汽压力
    - 炉膛差压
    - 一次风流量
    - 床温
    - 料层差压
    - 锅炉出口氧量
    - 二次风风量
    - 热值

  # 3个残差目标（模块内部用 .joblib 模型计算 resid_ 列）
  residual_targets:
    - 炉膛差压
    - 床温
    - 二次风风量

  # 3个残差模型输入（主汽流量在此作为X，但相似度权重为0）
  residual_inputs:
    - 主汽流量
    - 主汽压力
    - 吨煤产气量

  # 原始特征权重（主汽流量=0硬门控，热值=0占位）
  weights:
    主汽流量: 0.00
    吨煤产气量: 0.00
    主汽压力: 0.98
    炉膛差压: 0.50
    一次风流量: 0.49
    床温: 0.41
    料层差压: 0.57
    锅炉出口氧量: 0.42
    二次风风量: 0.30
    热值: 0.00

  # 残差特征权重 = 对应原始权重 × ratio（默认0.5）
  residual_weight_ratio: 0.5

  # 列别名映射（用于不同数据源的列名对齐）
  # 查询数据中的列名会被映射为标准样本中的列名
  column_aliases:
    吨煤产汽量（2h）: 吨煤产气量

  # 输出的控制变量列（不含热值、不含残差）
  plan_center_cols:
    - 主汽流量
    - 主汽压力
    - 炉膛差压
    - 一次风流量
    - 床温
    - 料层差压
    - 锅炉出口氧量
    - 二次风风量

  load_col: 主汽流量
  eff_col: 锅炉效率
  heat_value_col: 热值
  date_col: 日期        # 稳定工况数据中的日期列名，用于最后一个月排除

matching:
  # D = a*S + b*E（无频次分F）
  # S = 马氏距离相似度（柯西核 S=1/(1+d²)，加权协方差矩阵）
  # E = 效率分位数（0~1）
  d_weight_s: 1.0    # a（相似度权重）
  d_weight_e: 0.0    # b（效率权重）
  top_k: 5
  plan_center_mode: 2          # 1=最佳单样本, 2=Top-k加权均值
  topk_avg_method: weighted    # "mean" | "weighted"
  low_sim_fallback_threshold: 0.75
  enable_low_sim_fallback: true
  allow_fallback_nearest_load: false

flow_gate:
  # 主汽流量硬门控：偏差超阈值时相似度置0
  enable: true
  mode: absolute    # "absolute" | "relative"
  abs_threshold: 15.0    # t/h（绝对偏差阈值）
  rel_threshold: 0.05    # 相对偏差阈值（相对模式）

continuity:
  enable_rate_limit: false
  rate_limit_features:
    - 炉膛差压
    - 一次风流量
    - 床温
    - 料层差压
    - 锅炉出口氧量
    - 二次风风量
  rate_limit_abs:
    炉膛差压: 50.0
    一次风流量: 2.0
    床温: 3.0
    料层差压: 50.0
    锅炉出口氧量: 0.30
    二次风风量: 1.0
  reset_on_time_gap: true
  max_gap_minutes: 5.0

paths:
  # 实际数据路径
  stable_parquet: "D:/redian/vectorsearch/plan_center/output/vector_db.parquet"        # 向量数据库（训练输出）
  residual_model_dir: "D:/redian/vectorsearch/plan_center/output/residual_models"    # 残差模型目录
  covariance_path: "D:/redian/vectorsearch/plan_center/output/covariance.json"       # 加权协方差逆矩阵（马氏距离用，稳定工况路径）
  query_parquet: "D:/redian/vectorsearch/#4_df_all_1min.parquet"                     # 分钟级查询数据
  cache_path: null    # null=不缓存


train:
  # 残差特征训练配置
  input_parquet: "D:/redian/vectorsearch/#4_final_stable_df_mean_3_4_02.parquet"    # 输入：稳定工况原始数据
  output_dir: "D:/redian/vectorsearch/plan_center/output"                            # 输出目录

  # 合理工况筛选（可开关）
  enable_filter: true
  filter_cols:
    - 炉膛差压
    - 一次风流量
    - 床温
    - 料层差压
    - 锅炉出口氧量
  filter_q_low: 0.02
  filter_q_high: 0.98
  filter_n_bins: 15
  filter_max_bad_features: 2

  # 分层抽样（可开关）
  enable_stratified_split: true
  train_ratio: 0.70
  valid_ratio: 0.15
  test_ratio: 0.15

  # 残差模型
  oof_n_splits: 5

  # 残差模型参数（HistGradientBoostingRegressor）
  residual_model_params:
    max_iter: 200
    learning_rate: 0.05
    max_depth: 6
    min_samples_leaf: 20
    l2_regularization: 1.0
    random_state: 42

time_col: null    # null=自动识别时间列

# =============================================
# DTW 时序查询配置
# =============================================
# 相似度度量：加权马氏距离 + 柯西核（与稳定工况查询路径一致）
#   - 标准化：通过加权协方差逆矩阵 M 隐式标准化
#   - 加权：M = W^(1/2) Σ⁻¹ W^(1/2)（权重0的特征自动排除）
#   - DTW 对齐代价 = 马氏距离 d=sqrt((q-x)ᵀM(q-x))
#   - 对齐后相似度 = 柯西核 S=1/(1+d²) 均值，映射到 (0,1]
#   - 协方差逆矩阵 M 复用 paths.covariance_path（与稳定工况路径共用）
dtw_query:
  # 参考窗口：当前时刻往前 N 天
  ref_days: 3

  # 查询序列长度（分钟）
  query_seq_len: 5

  # DTW 候选序列长度范围（分钟）：最短 ~ 最长
  dtw_min_len: 4
  dtw_max_len: 6

  # 滑动步长（分钟）
  slide_step: 1

  # Top-k
  top_k: 5

  # 残差缓存路径
  resid_cache_parquet: "D:/redian/vectorsearch/#4_df_all_1min_with_resid.parquet"

  # dtw_feature_weights：DTW 马氏距离加权权重（M = W^(1/2) Σ⁻¹ W^(1/2) 嵌入权重，权重0的特征自动排除）
  # 与 features.weights 一致，此处保留用于 DTW 路径独立配置
  dtw_feature_weights:
    主汽流量: 0.0
    吨煤产气量: 0.0
    主汽压力: 0.98
    炉膛差压: 0.50
    一次风流量: 0.49
    床温: 0.41
    料层差压: 0.57
    锅炉出口氧量: 0.42
    二次风风量: 0.30
    热值: 0.0

  # 预筛配置：DTW 前两级预筛，减少候选数量
  # 1. 负荷初筛：查询序列平均主汽流量 ± load_threshold，筛选参考窗口内连续片段
  # 2. 马氏距离预筛：等长滑窗（query_seq_len）+ 逐点马氏距离 + 柯西核相似度 S=1/(1+d²)，低于阈值的删掉
  # 3. DTW 阶段：在马氏距离通过的窗口起点上生成 6 分钟候选，做加权马氏距离 DTW 对齐
  prefilter:
    enable: true
    load_threshold: 15.0      # 负荷初筛阈值（t/h），与 flow_gate.abs_threshold 一致
    sim_threshold: 0.7        # 柯西核相似度阈值 S=1/(1+d²)，低于此值的窗口删掉
    slide_step: 1             # 预筛滑窗步长（分钟）

  # 并行计算配置
  # 单次查询内部 DTW 并行线程数（numpy 运算释放 GIL，可部分并行）
  n_workers: 4

  # Sakoe-Chiba 带约束：限制 DP 只计算 |i-j| <= w 的单元
  # w=0 表示无约束（全矩阵），w=1 时减少约 50% 计算量
  # 约束：w >= |query_seq_len - dtw_max_len|（否则终点不可达）
  # 当前 query_seq_len=5, dtw_max_len=6，|5-6|=1，故 w 最小为 1
  sakoe_chiba_w: 2

  # DTW 路径最少不重复候选帧数（用于过滤对齐质量差的候选）
  # 路径中不重复候选帧数 < 此值的候选，相似度置 0
  min_coverage: 4

# =============================================
# 权重寻优配置（数值梯度下降）
# =============================================
optimize:
  # 数值梯度下降超参数
  learning_rate: 0.05        # 梯度下降学习率
  num_epochs: 20             # 训练轮次
  batch_days: 1              # 每个 batch 的天数
  fd_step: 1e-3              # 差分步长（相对权重和的比例，乘以当前权重和后作为扰动量）
  random_seed: 42            # 随机种子（控制天切分的shuffle顺序）
  max_weight: 1.0            # 权重上界（防止无限增大）

  # 加速选项
  grad_mode: forward         # "forward"=前向差分(快,9次前向/batch) | "central"=中心差分(准,17次前向/batch)
  query_stride: 1            # 查询数据降采样：每 N 行取 1 行（1=不降采样，5=约5倍提速）

  # loss 中各控制变量的权重（0=不参与loss）
  # 主汽流量/热值固定为0（硬门控变量）
  loss_feature_weights:
    主汽压力: 1.0
    炉膛差压: 1.0
    一次风流量: 1.0
    床温: 1.0
    料层差压: 1.0
    锅炉出口氧量: 0.6
    二次风风量: 0.6

  # 寻优期间强制关闭低相似度回退（避免优化器"作弊"靠回退降低误差）
  disable_fallback_during_opt: true

  # 输出报告路径（相对于 output_dir）
  report_csv: "optimize_report.csv"
  report_json: "optimize_report.json"

# =============================================
# 遗传进化算法权重寻优配置
# =============================================
optimize_genetic:
  # 种群参数
  population_size: 50       # 种群大小
  n_generations: 40         # 迭代代数
  elite_size: 5             # 精英保留数（不参与交叉变异，直接进入下一代）

  # 选择参数
  tournament_size: 3        # 锦标赛选择参赛者数

  # 交叉参数
  crossover_rate: 0.8       # 交叉概率
  crossover_method: blend  # "blend"=模拟二进制交叉(SBX) | "uniform"=均匀交叉

  # 变异参数
  mutation_rate: 0.15       # 变异概率（按个体）
  mutation_scale: 0.1       # 变异幅度（相对标准差的比例）

  # 约束（开放限制：只要非负即可）
  min_weight: 0.0           # 权重下界（非负）
  max_weight: 10.0           # 权重上界（允许较大权重）

  # 加速选项
  query_stride: 5           # 查询数据降采样：每 N 行取 1 行
  batch_days: 5             # 评估batch天数
  sbx_eta: 15.0             # SBX分布指数（控制子代与父代的接近程度）

  # loss 配置（继承 defaults.yaml 的 loss_feature_weights）
  # 遗传算法寻优期间强制关闭低相似度回退
  disable_fallback_during_opt: true

  # 输出报告路径（相对于 output_dir）
  report_csv: "optimize_genetic_report.csv"
  report_json: "optimize_genetic_report.json"

# =============================================
# 遗传进化算法权重寻优 V2（单 evaluator，最后一个月数据）
# =============================================
optimize_v2:
  # 种群参数
  population_size: 75       # 种群大小
  n_generations: 100         # 迭代代数
  elite_size: 7             # 精英保留数

  # 选择参数
  tournament_size: 5        # 锦标赛选择参赛者数

  # 交叉参数
  crossover_rate: 0.8       # 交叉概率
  crossover_method: blend  # "blend"=SBX | "uniform"=均匀交叉

  # 变异参数
  mutation_rate: 0.15       # 变异概率
  mutation_scale: 0.1       # 变异幅度

  # 约束（开放限制：只要非负即可）
  min_weight: 0.0           # 权重下界（非负）
  max_weight: 10.0          # 权重上界（允许较大权重）

  # 数据策略
  query_stride: 5          # 降采样步长（60=每60行取1行，约720行/月）

  # SBX参数
  sbx_eta: 15.0             # SBX分布指数

  # loss 配置（继承 defaults.yaml 的 loss_feature_weights）
  disable_fallback_during_opt: true
  loss_feature_weights:
    主汽压力: 1.0
    炉膛差压: 1.0
    一次风流量: 1.0
    床温: 1.0
    料层差压: 1.0
    锅炉出口氧量: 0.6
    二次风风量: 0.6

  # 输出报告路径
  report_csv: "optimize_v2_report.csv"
  report_json: "optimize_v2_report.json"
